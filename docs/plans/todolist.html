<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JanusAgent 任务清单 · TodoList</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #1a1d27;
    --panel-2: #232734;
    --border: #2e3342;
    --text: #e6e8ee;
    --muted: #9aa1b1;
    --accent: #6c8cff;
    --todo: #6b7280;
    --doing: #3b82f6;
    --done: #22c55e;
    --block: #ef4444;
    --p0: #ef4444;
    --p1: #f59e0b;
    --p2: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 24px 16px 80px;
  }
  .container { max-width: 960px; margin: 0 auto; }
  header { margin-bottom: 20px; }
  h1 { font-size: 26px; margin-bottom: 8px; }
  h1 .emoji { margin-right: 6px; }
  .subtitle { color: var(--muted); font-size: 14px; }
  .subtitle a { color: var(--accent); text-decoration: none; }

  /* Progress */
  .progress-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    margin: 18px 0;
  }
  .progress-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
  }
  .progress-head .pct { font-size: 22px; font-weight: 700; color: var(--done); }
  .bar { height: 10px; background: var(--panel-2); border-radius: 6px; overflow: hidden; }
  .bar > span { display: block; height: 100%; background: linear-gradient(90deg,#22c55e,#4ade80); width: 0; transition: width .4s ease; }
  .stat-row { display: flex; gap: 16px; margin-top: 14px; flex-wrap: wrap; font-size: 13px; }
  .stat-row .item { display: flex; align-items: center; gap: 6px; color: var(--muted); }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

  /* Toolbar */
  .toolbar {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    margin-bottom: 18px;
  }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
    padding: 6px 12px; border-radius: 999px; cursor: pointer; font-size: 13px;
    user-select: none; transition: all .15s;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .spacer { flex: 1; }
  .btn {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
    padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 13px;
  }
  .btn:hover { color: var(--text); border-color: var(--accent); }

  /* Sections */
  .section { margin-bottom: 26px; }
  .section > h2 {
    font-size: 18px; margin-bottom: 4px;
    display: flex; align-items: center; gap: 8px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .section .sec-note { color: var(--muted); font-size: 13px; margin: 8px 0 6px; }
  .subsection > h3 { font-size: 15px; color: var(--accent); margin: 16px 0 8px; }

  /* Task item */
  .task {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
    transition: background .15s, opacity .2s;
  }
  .task:hover { background: var(--panel-2); }
  .task.done { opacity: .55; }
  .task.done .label { text-decoration: line-through; }
  .status-btn {
    flex: 0 0 auto; width: 24px; height: 24px; border-radius: 7px;
    border: 2px solid var(--border); background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff; margin-top: 1px;
  }
  .status-btn.todo   { border-color: var(--todo); }
  .status-btn.doing  { background: var(--doing); border-color: var(--doing); }
  .status-btn.done   { background: var(--done); border-color: var(--done); }
  .status-btn.block  { background: var(--block); border-color: var(--block); }
  .badge {
    flex: 0 0 auto; font-size: 11px; font-weight: 700; padding: 2px 8px;
    border-radius: 6px; margin-top: 2px; color: #fff;
  }
  .badge.p0 { background: var(--p0); }
  .badge.p1 { background: var(--p1); }
  .badge.p2 { background: var(--p2); }
  .label { flex: 1; font-size: 14px; }
  .label strong { color: #fff; }
  .task.hidden { display: none; }
  .section.hidden, .subsection.hidden { display: none; }

  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 30px; }
  code { background: var(--panel-2); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span class="emoji">🎯</span>JanusAgent 任务清单 · TodoList</h1>
    <p class="subtitle">roadmap 讲「为什么 / 蓝图」，本清单讲「做什么 / 怎么勾」。近期拆到可上手粒度，中远期保持里程碑级。</p>
  </header>

  <div class="progress-card">
    <div class="progress-head">
      <div>总体进度</div>
      <div class="pct" id="pct">0%</div>
    </div>
    <div class="bar"><span id="bar"></span></div>
    <div class="stat-row" id="stats"></div>
  </div>

  <div class="toolbar">
    <div class="filters" id="statusFilters">
      <span class="chip active" data-filter="status" data-val="all">全部</span>
      <span class="chip" data-filter="status" data-val="todo">待办</span>
      <span class="chip" data-filter="status" data-val="doing">进行中</span>
      <span class="chip" data-filter="status" data-val="done">完成</span>
      <span class="chip" data-filter="status" data-val="block">阻塞</span>
    </div>
    <div class="filters" id="prioFilters">
      <span class="chip active" data-filter="prio" data-val="all">全部优先级</span>
      <span class="chip" data-filter="prio" data-val="P0">P0</span>
      <span class="chip" data-filter="prio" data-val="P1">P1</span>
      <span class="chip" data-filter="prio" data-val="P2">P2</span>
    </div>
    <div class="spacer"></div>
    <button class="btn" id="resetBtn">重置状态</button>
  </div>

  <div id="board"></div>

  <footer>
    点击左侧方块循环切换状态：待办 → 进行中 → 完成 → 阻塞。状态自动保存在本地浏览器。
  </footer>
</div>

<script>
// 数据结构：从 todolist.md 解析而来
const DATA = [
  {
    title: "🎯 当前聚焦（Top 3）",
    tasks: [
      { p: "P0", t: "通读 <strong>agentpool</strong>：搞清 agent 如何定义、YAML 如何配置、如何跑起对话循环、如何接 LLM" },
      { p: "P0", t: "让 <strong>main.py</strong> 用 <strong>agentpool</strong> 驱动一个最简 agent，替换现在的 hello() 占位" },
      { p: "P0", t: "跑通一轮真实 CLI 对话（python main.py → 能问能答）" },
    ]
  },
  {
    title: "第 1 月 · M0 + M2：能帮我炒股的 Agent",
    subs: [
      {
        title: "M0 骨架跑通",
        tasks: [
          { p: "P0", t: "通读 agentpool 的 agent 加载 / 运行 / LLM 接入机制，记一页速查笔记" },
          { p: "P0", t: "规划 packages 职责边界：agent-core（通用内核蓄水池）vs quant-agent（业务）各放什么" },
          { p: "P0", t: "配置 LLM 接入：.env 管理 API Key（<strong>密钥不进 git</strong>，写进 .gitignore 校验）" },
          { p: "P0", t: "写第一个最简 agent 的 YAML 配置（基模 + system prompt + 无工具）" },
          { p: "P0", t: "改造 main.py：用 agentpool 加载该 YAML 并进入对话循环" },
          { p: "P1", t: "冒烟验证：连续多轮对话不崩，能正常调用基模" },
        ]
      },
      {
        title: "M2 协助面（量化炒股）",
        tasks: [
          { p: "P0", t: "行情数据源选型（akshare / tushare / yfinance 等），确定一个先接" },
          { p: "P0", t: "quant-agent：实现「行情查询」工具（K线 / 基本面）" },
          { p: "P1", t: "回测框架选型（backtrader / 自研简版），确定方案" },
          { p: "P1", t: "quant-agent：实现「策略定义 + 回测」工具" },
          { p: "P0", t: "把行情 / 回测工具挂到 quant agent，支持对话式调用" },
          { p: "P0", t: "<strong>验收</strong>：对某只股票跑一次「分析 → 建议」（<strong>仅模拟盘，不接实盘下单</strong>）" },
          { p: "P2", t: "本月复盘：协助基础质量如何（专属度此阶段不测）" },
        ]
      }
    ]
  },
  {
    title: "第 2 月 · M1 + M3：懂我的定制化炒股伙伴",
    subs: [
      {
        title: "M1 记忆底座 + 定制化（全局最难的地基）",
        tasks: [
          { p: "P0", t: "设计记忆底座数据模型：长期记忆 + 用户画像 schema" },
          { p: "P0", t: "用户画像采集与存储：偏好 / 资金规模 / 交易习惯 / 风控意识" },
          { p: "P1", t: "长期记忆存取（调研能否复用 agentpool 的 storage）" },
          { p: "P1", t: "一致性探针：矛盾检测 + 关键事实遗忘检测" },
          { p: "P0", t: "画像驱动的策略 / 流程动态调整（「活的流程」）" },
          { p: "P0", t: "记忆 / 画像<strong>开关</strong>，支持对照测量" },
          { p: "P0", t: "<strong>验收</strong>：开 / 关画像对照，协助专属度 delta > 0；一致性护栏不退化" },
        ]
      },
      {
        title: "M3 自进化（最小闭环，别贪全）",
        tasks: [
          { p: "P1", t: "成功 case 沉淀：用户认可 → 存储 → 下次自动复用" },
          { p: "P2", t: "<strong>验收</strong>：记录专属度 delta 是否随周上升" },
        ]
      }
    ]
  },
  {
    title: "第 3 月 · M4：通用内核沉淀",
    tasks: [
      { p: "P1", t: "把 quant 上验证的记忆 / 画像 / 自进化机制抽象进 agent-core" },
      { p: "P1", t: "<strong>预留具身接口</strong>：perception（感知输入）/ actuation（行动输出）抽象，内核模态无关" },
      { p: "P2", t: "（可选）拿一个新场景做快速冷启动，验证通用性" },
      { p: "P2", t: "<strong>验收</strong>：新场景冷启动成本明显低于前两个" },
    ]
  },
  {
    title: "远期 · M5+ 具身 Janus（调研态，暂挂起）",
    tasks: [
      { p: "P2", t: "调研具身技术栈：VLA、多模感知、触觉传感 / 执行、机器人中间件、仿真" },
      { p: "P2", t: "触觉方案可行性验证（<strong>全链路最硬的一块，重点评估</strong>）" },
      { p: "P2", t: "具身载体形态选型（现成萌宠 / 萌玩平台，不自研硬件）" },
    ]
  },
  {
    title: "🔧 横切 · 工程基建（贯穿始终）",
    tasks: [
      { p: "P1", t: "指标看板：专属度 / 一致性的记录与对照方式" },
      { p: "P2", t: "单元测试 + CI（pre-commit 已配 ruff）" },
      { p: "P0", t: "风险红线守则落文档：仅模拟盘、密钥管理、不接实盘" },
    ]
  }
];

const STATUS_CYCLE = ["todo", "doing", "done", "block"];
const STATUS_LABEL = { todo: "待办", doing: "进行中", done: "完成", block: "阻塞" };
const STATUS_MARK  = { todo: "", doing: "~", done: "✓", block: "!" };
const STORAGE_KEY = "janus_todolist_state_v1";

let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
let filter = { status: "all", prio: "all" };
let idSeq = 0;

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function makeTask(task, secIdx, subIdx) {
  const id = "t_" + secIdx + "_" + (subIdx === undefined ? "x" : subIdx) + "_" + (idSeq++);
  const st = state[id] || "todo";
  const el = document.createElement("div");
  el.className = "task" + (st === "done" ? " done" : "");
  el.dataset.id = id;
  el.dataset.prio = task.p;
  el.dataset.status = st;

  const btn = document.createElement("button");
  btn.className = "status-btn " + st;
  btn.textContent = STATUS_MARK[st];
  btn.title = STATUS_LABEL[st];
  btn.onclick = () => {
    const cur = state[id] || "todo";
    const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(cur) + 1) % STATUS_CYCLE.length];
    state[id] = next;
    saveState();
    render();
  };

  const badge = document.createElement("span");
  badge.className = "badge " + task.p.toLowerCase();
  badge.textContent = task.p;

  const label = document.createElement("div");
  label.className = "label";
  label.innerHTML = task.t;

  el.appendChild(btn);
  el.appendChild(badge);
  el.appendChild(label);
  return el;
}

function passFilter(prio, status) {
  if (filter.status !== "all" && status !== filter.status) return false;
  if (filter.prio !== "all" && prio !== filter.prio) return false;
  return true;
}

function render() {
  idSeq = 0;
  const board = document.getElementById("board");
  board.innerHTML = "";
  let total = 0, counts = { todo: 0, doing: 0, done: 0, block: 0 };

  DATA.forEach((sec, si) => {
    const secEl = document.createElement("div");
    secEl.className = "section";
    const h2 = document.createElement("h2");
    h2.textContent = sec.title;
    secEl.appendChild(h2);
    let secVisible = 0;

    const renderTasks = (tasks, container, subi) => {
      let vis = 0;
      tasks.forEach(tk => {
        const id = "t_" + si + "_" + (subi === undefined ? "x" : subi) + "_" + idSeq;
        const st = state[id] || "todo";
        total++; counts[st]++;
        const node = makeTask(tk, si, subi);
        if (!passFilter(tk.p, st)) node.classList.add("hidden");
        else vis++;
        container.appendChild(node);
      });
      return vis;
    };

    if (sec.tasks) {
      secVisible += renderTasks(sec.tasks, secEl, undefined);
    }
    if (sec.subs) {
      sec.subs.forEach((sub, subi) => {
        const subEl = document.createElement("div");
        subEl.className = "subsection";
        const h3 = document.createElement("h3");
        h3.textContent = sub.title;
        subEl.appendChild(h3);
        const vis = renderTasks(sub.tasks, subEl, subi);
        if (vis === 0) subEl.classList.add("hidden");
        secVisible += vis;
        secEl.appendChild(subEl);
      });
    }
    if (secVisible === 0) secEl.classList.add("hidden");
    board.appendChild(secEl);
  });

  // progress
  const pct = total ? Math.round(counts.done / total * 100) : 0;
  document.getElementById("pct").textContent = pct + "%";
  document.getElementById("bar").style.width = pct + "%";
  document.getElementById("stats").innerHTML =
    statItem("var(--done)", "完成", counts.done) +
    statItem("var(--doing)", "进行中", counts.doing) +
    statItem("var(--block)", "阻塞", counts.block) +
    statItem("var(--todo)", "待办", counts.todo) +
    statItem("transparent", "总计", total, true);
}

function statItem(color, name, n, plain) {
  const dot = plain ? "" : '<span class="dot" style="background:' + color + '"></span>';
  return '<span class="item">' + dot + name + '：<b style="color:var(--text)">' + n + '</b></span>';
}

// filters
document.querySelectorAll(".chip").forEach(chip => {
  chip.onclick = () => {
    const f = chip.dataset.filter, v = chip.dataset.val;
    filter[f] = v;
    document.querySelectorAll('.chip[data-filter="' + f + '"]').forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    render();
  };
});

document.getElementById("resetBtn").onclick = () => {
  if (confirm("确定重置所有任务状态为「待办」？")) {
    state = {}; saveState(); render();
  }
};

render();
</script>
</body>
</html>
